<!DOCTYPE html>
<html lang="en">
<head>

    <title>Welcome</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            color: white;
        }
        .welcome-text {
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeIn 2s ease-in-out forwards;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .proceed-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .proceed-btn:hover {
            background-color: #45a049;
        }
        .link {
            text-decoration: false;
        }
    </style>
</head>
<body>
    <div class="welcome-text">
        Welcome our distinguished User!!
    </div>
    <button class="proceed-btn" onclick="proceed()"><a class="link" href="Login.html">Proceed</a></button>

   
</body>
</html>
